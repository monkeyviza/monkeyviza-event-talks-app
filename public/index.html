<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechTalks 2026 | 1-Day Technical Event</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="container">
            <h1>TechTalks <span>2026</span></h1>
            <p>One Day. Six Expert Talks. Infinite Inspiration.</p>
            <div class="search-container">
                <input type="text" id="category-search" placeholder="Search by category (e.g., AI, Rust, Backend)...">
            </div>
        </div>
    </header>

    <main class="container">
        <section id="schedule-container">
            <!-- Schedule items will be injected here -->
            <div class="loader">Loading schedule...</div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 TechTalks Conference. Built with Node.js.</p>
        </div>
    </footer>

    <script src="app.js"></script>
</body>
</html>
